name: Telefoon
description: >-
  Telefoon is a cloud telephony and communications platform offering programmable
  voice, SMS, and number management APIs tailored for European markets. Built for
  GDPR compliance and EU regulatory requirements, Telefoon provides developers with
  REST APIs to build voice calling, SMS notification, number provisioning, and
  interactive voice response (IVR) solutions. The platform supports Dutch, Belgian,
  German, and broader European telecommunications infrastructure with local number
  availability and EU data residency.
image: https://www.telefoon.com/logo.png
url: https://www.telefoon.com
type: Index
tags:
  - Belgium
  - CPaaS
  - EU Data Residency
  - Europe
  - GDPR Compliant
  - Messaging
  - Netherlands
  - Number Provisioning
  - SMS
  - Telephony
  - Voice
created: '2024-01-01'
modified: '2026-05-03'
apis:
  - name: Telefoon Voice API
    description: >-
      Programmable voice API for making and receiving calls across European networks.
      Supports outbound dialing, inbound call handling, IVR with multi-language
      text-to-speech (Dutch, French, German, English), call conferencing, call
      recording, and SIP trunking. Built with EU data residency and GDPR compliance
      for European enterprise customers.
    image: https://www.telefoon.com/images/voice-api.png
    humanURL: https://developers.telefoon.com/voice
    baseURL: https://api.telefoon.com/v1/voice
    tags:
      - Calls
      - EU Telephony
      - IVR
      - Netherlands
      - Telephony
      - TTS
      - Voice
    properties:
      - type: Documentation
        url: https://developers.telefoon.com/voice
      - type: OpenAPI
        url: openapi/telefoon-voice-openapi.yml
      - type: Authentication
        url: https://developers.telefoon.com/authentication
      - type: GettingStarted
        url: https://developers.telefoon.com/getting-started
      - type: RateLimits
        url: https://developers.telefoon.com/rate-limits
    contact:
      - type: Support
        url: https://www.telefoon.com/support
      - type: Email
        url: mailto:api-support@telefoon.com

  - name: Telefoon SMS API
    description: >-
      Send and receive SMS messages across European networks with full GDPR
      compliance. Supports A2P messaging, two-way SMS, delivery reports, unicode
      for European character sets (Dutch, German, French), bulk SMS, and message
      archiving for GDPR audit trails. Provides SMS sender ID registration for
      branded messaging in EU markets.
    image: https://www.telefoon.com/images/sms-api.png
    humanURL: https://developers.telefoon.com/sms
    baseURL: https://api.telefoon.com/v1/sms
    tags:
      - A2P Messaging
      - Europe
      - GDPR
      - Messaging
      - SMS
      - Sender ID
    properties:
      - type: Documentation
        url: https://developers.telefoon.com/sms
      - type: OpenAPI
        url: openapi/telefoon-sms-openapi.yml
      - type: Authentication
        url: https://developers.telefoon.com/authentication
      - type: RateLimits
        url: https://developers.telefoon.com/rate-limits
    contact:
      - type: Support
        url: https://www.telefoon.com/support
      - type: Email
        url: mailto:api-support@telefoon.com

  - name: Telefoon Number Management API
    description: >-
      Search, purchase, and manage Dutch, Belgian, German, and broader European
      phone numbers. Supports local geographic numbers (NDC/area codes), national
      numbers, toll-free (0800), premium-rate (0900), and service numbers (0906).
      Handles regulatory requirements including address registration for Dutch and
      Belgian number types and porting requests (number portability).
    image: https://www.telefoon.com/images/numbers-api.png
    humanURL: https://developers.telefoon.com/numbers
    baseURL: https://api.telefoon.com/v1/numbers
    tags:
      - Belgian Numbers
      - Dutch Numbers
      - EU Numbers
      - Number Management
      - Number Portability
      - Number Provisioning
      - Phone Numbers
    properties:
      - type: Documentation
        url: https://developers.telefoon.com/numbers
      - type: OpenAPI
        url: openapi/telefoon-numbers-openapi.yml
      - type: Authentication
        url: https://developers.telefoon.com/authentication
    contact:
      - type: Support
        url: https://www.telefoon.com/support
      - type: Email
        url: mailto:api-support@telefoon.com

